<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات MVP مع إشعارات</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        #chat-box { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px; background: #e9f5ff; border-radius: 5px; }
        #msg-input { width: 65%; padding: 10px; }
        #sender-name { width: 20%; padding: 10px; }
        button { padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px;}
        #enable-notifications { background: #28a745; margin-bottom: 15px;}
    </style>
</head>
<body>
    <h2>تطبيق دردشة بسيط (MVP)</h2>
    <button id="enable-notifications">تفعيل الإشعارات 🔔</button>
    
    <div id="chat-box"></div>
    
    <input type="text" id="sender-name" placeholder="اسمك">
    <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
    <button id="send-btn">إرسال</button>

    <!-- تضمين مكتبات Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
